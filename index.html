<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Опрос</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800|manrope:600,700,800" />
  <link rel="stylesheet" href="styles.css?v=17" />
</head>
<body>
  <main class="wrap">
    <header class="top">
      <h1>Исследование</h1>
    </header>

    <form id="surveyForm" novalidate>
      <section id="screenRoot" class="screen-root"></section>

      <footer class="bottom-dock">
        <div class="privacy-note">
          Все данные строго анонимны, анализ проводится в обобщенном виде.
        </div>

        <div id="navRow" class="nav-row">
          <button type="button" id="prevBtn" class="btn secondary">Назад</button>
          <button type="button" id="nextBtn" class="btn push-right">Далее</button>
          <button type="button" id="resultBtn" class="btn tertiary push-right" hidden>Посмотреть результаты</button>
          <button type="submit" id="submitBtn" class="btn" hidden>Отправить</button>
        </div>
      </footer>
    </form>
  </main>

  <script src="app.js?v=17"></script>
</body>
</html>
